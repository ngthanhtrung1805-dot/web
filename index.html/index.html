<!DOCTYPE html>
<html>
<head>
    <title>Quán Trà Sữa</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #111;
            color: white;
        }
        .box {
            border: 1px solid white;
            margin: 20px;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
        }
        img {
            width: 200px;
        }
        button {
            background-color: red;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<h1>TRÀ SỮA NGON 😎</h1>

<div class="box">
    <h2>Trà sữa trân châu</h2>
    <img src="https://picsum.photos/200">
    <p>Giá: 25.000đ</p>
    <button onclick="alert('Liên hệ Zalo để đặt!')">Mua ngay</button>
</div>

<div class="box">
    <h2>Trà đào cam sả</h2>
    <img src="https://picsum.photos/201">
    <p>Giá: 30.000đ</p>
    <button onclick="alert('Liên hệ Zalo để đặt!')">Mua ngay</button>
</div>

<p>📞 Liên hệ: 0123456789</p>

</body>
</html>
